site_name: stability-check
site_description: 领域无关的自治循环稳定性测试框架（Harness / Loop / MAS 三引擎架构）
site_author: sunbos
repo_url: https://github.com/sunbos/stability-check
repo_name: stability-check
edit_uri: edit/master/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 系统架构图: plans/系统架构.md
  - 代码物理地图: plans/代码物理地图.md
  - 决策日志: plans/决策日志.md
  - 事件链索引: plans/事件链索引.md
  - API 参考: api-reference.md
  - 设计文档:
      - 架构演进路线: plans/架构演进路线.md
      - 门禁对讲通用稳定性用例集: plans/门禁对讲通用稳定性用例集.md
      - 门禁设备稳定性测试框架设计方案: plans/门禁设备稳定性测试框架设计方案.md
      - 用例模板: plans/2026-07-15-stability-harness-loop-multiagent-template.md
  - 架构演进分析:
      - 分析报告: plans/architecture-evolution/analysis-report.md
      - 设计: plans/architecture-evolution/design.md
      - 计划: plans/architecture-evolution/plan.md
  - 门禁对讲实现记录:
      - 稳定性设计(spec): superpowers/specs/2026-07-17-hikvision-door-stability-design.md
      - 稳定性实现(impl): superpowers/plans/2026-07-17-hikvision-door-stability-impl.md
  - 框架长期演进:
      - 演进设计(spec): superpowers/specs/2026-07-20-framework-long-term-evolution-design.md
      - 演进实施(impl): superpowers/plans/2026-07-20-framework-long-term-evolution-impl.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [stability_harness_loop_multiagent]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

# Mermaid 渲染:superfences 用 fence_div_format 把 ```mermaid 块包成 <div class="mermaid">,
# mermaid-init.js 在脚本加载后调用 mermaid.run({ nodes }) 渲染。
# 参见 https://squidfunk.github.io/mkdocs-material/reference/diagrams/
extra_javascript:
  - js/mermaid.min.js
  - js/mermaid-init.js

# 自定义 CSS:Mermaid 容器自适应 + 滚动支持
extra_css:
  - stylesheets/extra.css
